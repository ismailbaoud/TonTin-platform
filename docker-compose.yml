services:
  postgres:
    image: postgres:16-alpine
    container_name: tontin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tontin_test}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    ports:
      - "5432:5432"
    volumes:
      - tontin-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tontin_test}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./platform-back
      dockerfile: Dockerfile
    container_name: tontin-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 9090
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tontin_test}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-root}
      SECURITY_JWT_SECRET_KEY: ${SECURITY_JWT_SECRET_KEY:-72ccaf3126509f5ad2973e3f1c81fcbf24b3cac93114eba0754b94c4c02f10d9}
      SECURITY_JWT_ISSUER: ${SECURITY_JWT_ISSUER:-tontin-platform}
      SECURITY_JWT_ACCESS_TOKEN_EXPIRATION: ${SECURITY_JWT_ACCESS_TOKEN_EXPIRATION:-900000}
      SECURITY_JWT_REFRESH_TOKEN_EXPIRATION: ${SECURITY_JWT_REFRESH_TOKEN_EXPIRATION:-2592000000}
      SECURITY_PASSWORD_BCRYPT_STRENGTH: ${SECURITY_PASSWORD_BCRYPT_STRENGTH:-10}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
      APP_MAIL_SENDER_NAME: ${APP_MAIL_SENDER_NAME:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      ENV: ${ENV:-development}
    ports:
      - "9090:9090"

  frontend:
    build:
      context: ./platform-front
      dockerfile: Dockerfile
    container_name: tontin-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  tontin-postgres-data:
